name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run detekt
        run: ./gradlew sdk:detekt

      - name: Run ktlint
        run: ./gradlew sdk:ktlintCheck

  test-jvm:
    name: Test (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run JVM tests
        run: ./gradlew sdk:jvmTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-jvm
          path: sdk/build/reports/tests/jvmTest/
          retention-days: 14

  test-js:
    name: Test (JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run JS tests
        run: ./gradlew sdk:jsNodeTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-js
          path: sdk/build/reports/tests/jsNodeTest/
          retention-days: 14

  test-apple:
    name: Test (Apple)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run macOS tests
        run: ./gradlew sdk:macosArm64Test

      - name: Run iOS simulator tests
        run: ./gradlew sdk:iosSimulatorArm64Test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-apple
          path: |
            sdk/build/reports/tests/macosArm64Test/
            sdk/build/reports/tests/iosSimulatorArm64Test/
          retention-days: 14
